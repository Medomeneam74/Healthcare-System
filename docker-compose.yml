services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DB_URL=${DB_URL}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - BASE_URL=https://nfchealthcare.ddns.net
      - FRONTEND_URL=https://nfchealthcare.ddns.net
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - API_KEY=${API_KEY}
      - API_SECRET=${API_SECRET}
      - DDI_SERVICE_URL=http://ai_model:8000
      - CHATBOT_SERVICE_URL=http://chatbot:8001
    restart: always
    networks:
      - smart_network

  chatbot:
    build:
      context: .
      dockerfile: Dockerfile.chatbot
    environment:
      - MONGO_URI=${MONGO_URI}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SPEECHMATICS_API_KEY=${SPEECHMATICS_API_KEY}
      - CHATBOT_GROQ_MODEL=${CHATBOT_GROQ_MODEL:-gemini-2.5-flash}
      - CHAT_COLLECTION=${CHAT_COLLECTION}
      - DDI_SERVICE_URL=http://ai_model:8000
    expose:
      - "8001"
    restart: always
    networks:
      - smart_network

  ai_model:
    build:
      context: .
      dockerfile: Dockerfile.ai
    environment:
      - MONGO_URI=${MONGO_URI}
      - DDI_GROQ_API_KEY=${DDI_GROQ_API_KEY}
    expose:
      - "8000"
    restart: always
    networks:
      - smart_network

  frontend:
    build:
      context: ./vite-frontend
      dockerfile: Dockerfile
    restart: always
    networks:
      - smart_network

  main_nginx:
    image: nginx:alpine
    container_name: main_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - ai_model
      - chatbot
      - frontend
    restart: always
    networks:
      - smart_network

networks:
  smart_network:
    driver: bridge
