version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DB_URL=mongodb+srv://bodytarek2003_db_user:bPzJxGCug6LhNKxl@cluster0.qkbfket.mongodb.net/nfc-healthcare?appName=Cluster0
    deploy:
      replicas: 2
    restart: always
    networks:
      - smart_network

  chatbot:
    build:
      context: .
      dockerfile: Dockerfile.chatbot
    environment:
      - MONGO_URI=mongodb+srv://bodytarek2003_db_user:bPzJxGCug6LhNKxl@cluster0.qkbfket.mongodb.net/nfc-healthcare?appName=Cluster0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SPEECHMATICS_API_KEY=${SPEECHMATICS_API_KEY}
      - DDI_SERVICE_URL=http://ai_model:8000
    expose:
      - "8001"
    restart: always
    networks:
      - smart_network

  ai_model:
    build:
      context: .
      dockerfile: Dockerfile.ai
    environment:
      - MONGO_URI=mongodb+srv://bodytarek2003_db_user:bPzJxGCug6LhNKxl@cluster0.qkbfket.mongodb.net/nfc-healthcare?appName=Cluster0
      - DDI_GROQ_API_KEY=${DDI_GROQ_API_KEY}
    expose:
      - "8000"
    restart: always
    networks:
      - smart_network

  frontend:
    build:
      context: ./vite-frontend
    restart: always
    networks:
      - smart_network

  main_nginx:
    image: nginx:alpine
    container_name: main_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - ai_model
      - chatbot
      - frontend
    restart: always
    networks:
      - smart_network

networks:
  smart_network:
    driver: bridge
