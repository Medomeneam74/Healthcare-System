---
apiVersion: apps/v1
kind: Deployment
metadata: { name: main-nginx }
spec:
  replicas: 1
  selector: { matchLabels: { app: main-nginx } }
  template:
    metadata: { labels: { app: main-nginx } }
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        - containerPort: 443
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/nginx.conf
          readOnly: true
        - name: certs
          mountPath: /etc/letsencrypt
          readOnly: true
      volumes:
      - name: nginx-conf
        hostPath: { path: /home/ubuntu/final/nginx/nginx.conf }
      - name: certs
        hostPath: { path: /etc/letsencrypt }
---
apiVersion: v1
kind: Service
metadata: { name: main-nginx }
spec:
  type: LoadBalancer
  selector: { app: main-nginx }
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: https
    port: 443
    targetPort: 443
